<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plant Disease Detection</title>
    <link rel="stylesheet" href="professional-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Professional Header -->
        <header class="header">
            <div class="header-content">
                <a href="#" class="logo">
                    <div class="logo-icon">🌿</div>
                    <span>PlantAI</span>
                </a>
                <nav class="nav-menu">
                    <a href="#" class="nav-link">Home</a>
                    <a href="#" class="nav-link">About</a>
                    <a href="#" class="nav-link">Contact</a>
                </nav>
            </div>
        </header>

        <!-- Professional Authentication Container -->
        <main class="auth-container">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to access your plant disease detection dashboard</p>
            </div>
            
            <div class="auth-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="login-email" class="form-label">Email Address</label>
                        <input 
                            type="email" 
                            id="login-email" 
                            name="email" 
                            class="form-input"
                            placeholder="Enter your email address"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            id="login-password" 
                            name="password" 
                            class="form-input"
                            placeholder="Enter your password"
                            required
                        >
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        Sign In
                    </button>
                </form>
                
                <div id="login-error" class="error-message"></div>
            </div>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="professional-register.html" class="auth-link">Create Account</a></p>
                <p class="mt-2"><a href="#" class="auth-link">Forgot Password?</a></p>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
