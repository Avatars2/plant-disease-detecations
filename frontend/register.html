<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Plant Disease Detection</title>
    <link rel="stylesheet" href="professional-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Professional Header -->
        <header class="header">
            <div class="header-content">
                <a href="#" class="logo">
                    <div class="logo-icon">🌿</div>
                    <span>PlantAI</span>
                </a>
                <nav class="nav-menu">
                    <a href="#" class="nav-link">Home</a>
                    <a href="#" class="nav-link">About</a>
                    <a href="#" class="nav-link">Contact</a>
                </nav>
            </div>
        </header>

        <!-- Professional Authentication Container -->
        <main class="auth-container">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join us to start detecting plant diseases with AI</p>
            </div>
            
            <div class="auth-body">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="register-username" class="form-label">Full Name</label>
                        <input 
                            type="text" 
                            id="register-username" 
                            name="username" 
                            class="form-input"
                            placeholder="Enter your full name"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="register-email" class="form-label">Email Address</label>
                        <input 
                            type="email" 
                            id="register-email" 
                            name="email" 
                            class="form-input"
                            placeholder="Enter your email address"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="register-phone" class="form-label">Phone Number</label>
                        <input 
                            type="tel" 
                            id="register-phone" 
                            name="phone" 
                            class="form-input"
                            placeholder="Enter your 10-digit phone number"
                            pattern="[0-9]{10}"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="register-password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            id="register-password" 
                            name="password" 
                            class="form-input"
                            placeholder="Create a strong password (min 6 characters)"
                            required
                        >
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        Create Account
                    </button>
                </form>
                
                <div id="register-error" class="error-message"></div>
            </div>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="professional-login.html" class="auth-link">Sign In</a></p>
                <p class="mt-2">By creating an account, you agree to our <a href="#" class="auth-link">Terms of Service</a> and <a href="#" class="auth-link">Privacy Policy</a></p>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
